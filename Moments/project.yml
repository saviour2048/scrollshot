name: Tracejar
options:
  bundleIdPrefix: com.tongwei
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # 把下面改成你的 Apple 开发者 Team ID（Xcode ▸ Settings ▸ Accounts 里可查）
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Tracejar:
    type: application
    platform: iOS
    sources:
      # 源码文件夹名仍叫 Moments（仅内部路径，不影响 App 名）
      - path: Moments
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tongwei.moments
        INFOPLIST_FILE: Moments/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Moments/Resources/Moments.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
